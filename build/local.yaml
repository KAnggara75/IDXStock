apiVersion: v1
kind: Pod
metadata:
  name: idxstock
  labels:
    app: idxstock
spec:
  restartPolicy: Always
  containers:
    - name: idxstock
      image: localhost/idxstock:latest
      ports:
        - containerPort: 3000
          hostPort: 3000
      env:
        - name: TZ
          value: Asia/Jakarta
        - name: LOG_LEVEL
          value: "debug"
        - name: IDX_COOKIE
          value: ""
        - name: SCC_AUTH
          value: ""
        - name: SCC_URL
          value: "https://gist.githubusercontent.com/KAnggara75/6dfc17f99b9805542c0cdd6c9cea9ef2/raw/14e65ac47129a3da20de6b935cdafcdf21dc8982/scc.yaml"
